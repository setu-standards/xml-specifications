type: object
description: >-
  Abstract condition object. Can be used to include different concrete condition types
  based on 'conditionType' discriminator property.
oneOf:
  - $ref: ./condition-types/ageCondition.yaml
  - $ref: ./condition-types/employmentDurationCondition.yaml
  - $ref: ./condition-types/salaryScaleCondition.yaml
  - $ref: ./condition-types/textualCondition.yaml
  - $ref: ./condition-types/occurrenceCondition.yaml
  # Combination types
  - $ref: ./condition-types/combinations/allOf.yaml
  - $ref: ./condition-types/combinations/anyOf.yaml
  - $ref: ./condition-types/combinations/not.yaml
discriminator:
  propertyName: conditionType
  mapping:
    Age: ./condition-types/ageCondition.yaml
    EmploymentDuration: ./condition-types/employmentDurationCondition.yaml
    SalaryScale: ./condition-types/salaryScaleCondition.yaml
    Text: ./condition-types/textualCondition.yaml
    Occurence: ./condition-types/occurrenceCondition.yaml
    # Combination types
    AllOf: ./condition-types/combinations/allOf.yaml
    AnyOf: ./condition-types/combinations/anyOf.yaml
    Not: ./condition-types/combinations/not.yaml
