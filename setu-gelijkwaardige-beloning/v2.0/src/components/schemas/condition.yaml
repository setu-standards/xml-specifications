type: object
description: >-
  Abstract condition object. Can be used to include different concrete condition types
  based on 'conditionType' discriminator property.
oneOf:
  # Structured condition types
  - $ref: ./condition-types/ageCondition.yaml
  - $ref: ./condition-types/employmentDurationCondition.yaml
  - $ref: ./condition-types/occurrenceCondition.yaml
  - $ref: ./condition-types/positionProfileCondition.yaml
  - $ref: ./condition-types/salaryScaleCondition.yaml
  # Textual condition type (to be used when no other type fits)
  - $ref: ./condition-types/textCondition.yaml
  # Combination types
  - $ref: ./condition-types/combinations/allOfCondition.yaml
  - $ref: ./condition-types/combinations/anyOfCondition.yaml
  - $ref: ./condition-types/combinations/notCondition.yaml
discriminator:
  propertyName: conditionType
  mapping:
    # Structured condition types
    Age: ./condition-types/ageCondition.yaml
    EmploymentDuration: ./condition-types/employmentDurationCondition.yaml
    Occurence: ./condition-types/occurrenceCondition.yaml
    PositionProfile: ./condition-types/positionProfileCondition.yaml
    SalaryScale: ./condition-types/salaryScaleCondition.yaml
    # Textual condition type (to be used when no other type fits)
    Text: ./condition-types/textCondition.yaml
    # Combination types
    AllOf: ./condition-types/combinations/allOfCondition.yaml
    AnyOf: ./condition-types/combinations/anyOfCondition.yaml
    Not: ./condition-types/combinations/notCondition.yaml
