type: object
description: >-
  Abstract condition object. Can be used to include different concrete condition types
  based on 'conditionType' discriminator property.
oneOf:
  # Structured condition types
  - $ref: ./condition-types/age.yaml
  - $ref: ./condition-types/employmentDuration.yaml
  - $ref: ./condition-types/occurrence.yaml
  - $ref: ./condition-types/positionProfile.yaml
  - $ref: ./condition-types/salaryScale.yaml
  # Textual condition type (to be used when no other type fits)
  - $ref: ./condition-types/text.yaml
  # Combination types
  - $ref: ./condition-types/combinations/allOf.yaml
  - $ref: ./condition-types/combinations/anyOf.yaml
  - $ref: ./condition-types/combinations/not.yaml
discriminator:
  propertyName: conditionType
  mapping:
    # Structured condition types
    Age: ./condition-types/age.yaml
    EmploymentDuration: ./condition-types/employmentDuration.yaml
    Occurence: ./condition-types/occurrence.yaml
    PositionProfile: ./condition-types/positionProfile.yaml
    SalaryScale: ./condition-types/salaryScale.yaml
    # Textual condition type (to be used when no other type fits)
    Text: ./condition-types/text.yaml
    # Combination types
    AllOf: ./condition-types/combinations/allOf.yaml
    AnyOf: ./condition-types/combinations/anyOf.yaml
    Not: ./condition-types/combinations/not.yaml
