type: object
description: Single occurrence, e.g. a fixed date.
required:
  - occurrenceType
  - date
properties:
  occurrenceType:
    type: string
    const: Single
  date:
    type: string
    description: Point in time according to ISO 8601-1 format.
    format: date-time
    example: "2026-12-15"
examples:
  # Example: Occurrence on December 15, 2026
  - occurrenceType: Single
    date: "2026-12-15"
  # Example: Occurrence on July 1, 2024
  - occurrenceType: Single
    date: "2024-07-01"
