    description: "Individual choice budget (Dutch: IKB) is used if the employer has an individual choice budget. It's elements are used for the different options an employee has regarding this budget as well as its costs. "
    required:
      - name
      - origin
    additionalProperties: false
    properties:
      id:
        $ref: "#/definitions/Identifier"
      name:
        description: "The name or description of the arrangement, indicating the type of arrangement and providing extra information that does not fit in any of the other fields."
        type: string
      origin:
        $ref: "#/definitions/LabourAgreementReference"
      effectivePeriod:
        $ref: "#/definitions/EffectivePeriod"
      line:
        items:
          $ref: "#/definitions/ArrangementLineExtended"
        type: array
      option:
        items:
          $ref: "#/definitions/IndividualChoiceBudgetOption"
        type: array
      description:
        description: " A free‑text field for capturing additional details related to reward element (NL: beloningscomponent), such as specifics, limitations and other conditions."
        type: string
    type: object
  OtherArrangement:
    description: "This element can be used to provide any additional arrangements that have not been covered by the other elements."
    required:
      - name
      - origin
    additionalProperties: false
    properties:
