  IndividualChoiceBudgetOption:
    description: "Associates the different rates on how this individual choice budget can be spent (e.g. the percentage of salary that one extra day of vacation costs)."
    required:
      - description
    additionalProperties: false
    properties:
      description:
        description: "Detailed free text description on the method in which this budget can be spent by an employee."
        type: string
    type: object
  SalaryScale:
    description: "Base salary of a job or of an employee including minimum and maximum salary and certain salary steps. "
    required:
      - name
      - currency
    additionalProperties: false
    properties:
      name:
        description: "The name or label of the salary scale. E.g., 1,2,3."
        type: string
      minValue:
        description: "The minimum value of the salary scale."
        type: number
      maxValue:
        description: "The maximum value of the salary scale."
        type: number
      currency:
        description: "The three-letter currency code defined by the ISO 4217 standard (e.g., “EUR”, “USD”)."
        type: string
      salaryStep:
        items:
          $ref: "#/definitions/SalaryScaleStep"
        type: array
      careerLevel:
        $ref: "#/definitions/CareerLevel"
      positionProfileReference:
        items:
          $ref: "#/definitions/PositionProfileReference"
        type: array
    type: object
  PersonName:
    description: "A component for capturing summary or fine-grain data comprising a person's name."
    required:
      - formattedName
    additionalProperties: false
    properties:
      formattedName:
        $ref: "#/definitions/PersonName-formattedNameDatatype"
    type: object
  PositionProfile:
    description: "These are the position profiles for which the inquiry pay equity applies. From the salary table and other arrangements, you can also use these positions for the conditions of those arrangements."
    required:
      - positionId
      - positionTitle
      - origin
    additionalProperties: false
    properties:
      positionId:
        description: "The primary identifier of the position profile, typically from the system of record."
        required:
          - value
        additionalProperties: false
        properties:
          value:
            $ref: "#/definitions/IdValue"
        type: object
      positionTitle:
        $ref: "#/definitions/PositionProfile-positionTitleDatatype"
      origin:
        $ref: "#/definitions/LabourAgreementReference"
      referenceTitle:
        description: "This reference title provides a reference to the function/role as defined within the Collective Labour Agreement (CAO)."
        type: string
      workDescription:
        description: "The free text description of the work that this position normally requires."
        type: string
    type: object
  GeneralSalaryIncrease:
    description: "The general salary adjustment refers to the increase applied uniformly to the entire salary table. This adjustment ensures that all employees receive a consistent percentage or fixed increase in their salaries. Please mind the usage note when to use this container."
    additionalProperties: false
    properties:
      effectiveDate:
        $ref: "#/definitions/Occurrence"
      amount:
        description: "Container element that contains the value of the amount and the type of unit of the value."
        required:
          - value
          - unitCode
        additionalProperties: false
        properties:
          value:
            description: "The numerical value of the remuneration amount expressed as decimal. The unit type of this value can be specified in the unit code element."
            type: number
          unitCode:
            $ref: "#/definitions/AmountUnitCode"
        type: object
      description:
        description: "Free text description of the general salary table increase."
        type: string
    type: object
  Communication:
    description: "The communication channels (phone, email) to contact and reach the contact person."
    additionalProperties: false
    properties:
      phone:
        items:
          $ref: "#/definitions/PhoneTypeArray"
        type: array
      email:
        items:
          $ref: "#/definitions/EmailTypeArray"
        type: array
    type: object
  PhoneTypeArray:
    description: "Array of phone information details."
    required:
      - formattedNumber
    additionalProperties: false
    properties:
      formattedNumber:
        $ref: "#/definitions/PhoneTypeArray-formattedNumberDatatype"
    type: object
  AllowanceArrangement:
    description: "A container element that includes various allowances that can be granted to an employee."
    required:
      - name
      - origin
      - typeCode
    additionalProperties: false
    properties:
      id:
        $ref: "#/definitions/Identifier"
      name:
        description: "The name or description of the arrangement, indicating the type of arrangement and providing extra information that does not fit in any of the other fields."
        type: string
      origin:
        $ref: "#/definitions/LabourAgreementReference"
      effectivePeriod:
        $ref: "#/definitions/EffectivePeriod"
      typeCode:
        $ref: "#/definitions/AllowanceCode"
      period:
        items:
          $ref: "#/definitions/Period"
        type: array
      line:
        items:
          $ref: "#/definitions/ArrangementLine"
        type: array
      payDate:
        $ref: "#/definitions/Occurrence"
      reference:
        items:
          $ref: "#/definitions/AllowanceReferenceExtended"
        type: array
      phaseOutScheme:
        description: "If this allowance has a phasing out scheme arrangement, this can be described in this element. "
        type: string
      description:
        description: " A free‑text field for capturing additional details related to reward element (NL: beloningscomponent), such as specifics, limitations and other conditions."
        type: string
    type: object
  WorkDuration:
    description: "Specifies the default work duration. This consists of an amount block indicating the number of hours, an interval block specifying the period over which these hours apply, and a valuePerWeek field indicating the equivalent number of hours per week, useful for calculations such as leave entitlement."
    required:
      - amount
      - interval
      - valuePerWeek
    additionalProperties: false
    properties:
      amount:
        $ref: "#/definitions/AmountLimited"
      interval:
        $ref: "#/definitions/Interval"
      valuePerWeek:
        description: "The equivalent number of hours per week, useful for calculations such as leave entitlement."
        type: number
    type: object
  SalaryScaleStep:
    description: " Specifies the steps within each salary scale, where each step has a name/label, a salary value, and possible conditions."
    required:
      - name
      - value
    additionalProperties: false
    properties:
      name:
        description: "The name or label of the salary step. E.g., 1,2,3."
        type: string
      value:
        description: "The value of the salary scale step."
        type: number
      minimumWage:
        description: "A boolean that indicates whether this salary step is equal to the minimum wage. "
        type: boolean
      conditions:
        items:
          $ref: "#/definitions/Condition"
        type: array
    type: object
  CollectiveLabourAgreement:
    description: "Information about the collective labour agreement (CLA; CAO in Dutch) that determines the renumeration. In the Netherlands this can be the CLA of the ABU, NBBU or a specific CLA of the staffing customer."
    required:
      - name
      - id
    additionalProperties: false
    properties:
      name:
        description: "The name of the collective labour agreement (CLA)."
        type: string
      id:
        description: "The identifier of the collective labour agreement (CLA)."
        required:
          - value
        additionalProperties: false
        properties:
          value:
            $ref: "#/definitions/IdValue"
        type: object
      effectivePeriod:
        $ref: "#/definitions/EffectivePeriod"
      basedOn:
        description: "A collective labour agreement (CLA) applies if the employer is a member of the industry association, if the CLA has been declared generally binding for the sector by the Minister of Social Affairs and Employment, or if it is declared applicable in the employee's employment contract."
        type: string
    type: object
  WaitingDays:
    description: "The amount of waiting days (NL: wachtdagen) that the worker is subjected to before being eligible to receive sick pay."
    required:
      - value
      - unitCode
    additionalProperties: false
    properties:
