      line:
        items:
          $ref: "#/definitions/ArrangementLineExtended"
        type: array
      coverage:
        $ref: "#/definitions/Amount"
      description:
        description: " A free‑text field for capturing additional details related to reward element (NL: beloningscomponent), such as specifics, limitations and other conditions."
        type: string
    type: object
  SustainableEmployabilityArrangement:
    description: "Sustainable employability allows for the employer to add information regarding sustainable employability arrangement that the employer might have (e.g. study budget for the employee)."
    required:
      - name
      - origin
      - typeCode
    additionalProperties: false
    properties:
      id:
        $ref: "#/definitions/Identifier"
      name:
        description: "The name or description of the arrangement, indicating the type of arrangement and providing extra information that does not fit in any of the other fields."
        type: string
      origin:
        $ref: "#/definitions/LabourAgreementReference"
      effectivePeriod:
        $ref: "#/definitions/EffectivePeriod"
      typeCode:
        $ref: "#/definitions/SustainabilityCode"
      line:
        items:
          $ref: "#/definitions/ArrangementLineExtended"
        type: array
      payDate:
        $ref: "#/definitions/Occurrence"
      description:
        description: " A free‑text field for capturing additional details related to reward element (NL: beloningscomponent), such as specifics, limitations and other conditions."
        type: string
    type: object
  WeekdayCode:
    description: "The day in the week to which the allowance is applicable."
    additionalProperties: false
    properties:
      value:
        enum:
          - Monday
          - Tuesday
          - Wednesday
          - Thursday
          - Friday
          - Saturday
          - Sunday
          - Holiday
        type: string
    type: object
  Party:
    description: "The customer/hirer of the worker."
    required:
      - legalId
      - personContacts
    additionalProperties: false
    properties:
      id:
        items:
          $ref: "#/definitions/Identifier"
        maxItems: 2
        type: array
      name:
        $ref: "#/definitions/Party-nameDatatype"
      legalId:
        items:
          description: "A government assigned identifier to distinguish the party (organization, person, or legal entity) to a transaction."
          required:
            - value
            - schemeAgencyId
          additionalProperties: false
          properties:
            value:
              $ref: "#/definitions/IdValue"
            schemeAgencyId:
              $ref: "#/definitions/LegalSchemeAgencyId"
          type: object
        minItems: 1
        type: array
      personContacts:
        items:
          $ref: "#/definitions/ContactPerson"
        minItems: 1
        type: array
    type: object
  HolidayAllowanceArrangement:
    description: "A container that contains the details of the holiday allowance arrangement."
    required:
      - name
      - origin
    additionalProperties: false
    properties:
      id:
        $ref: "#/definitions/Identifier"
      name:
        description: "The name or description of the arrangement, indicating the type of arrangement and providing extra information that does not fit in any of the other fields."
        type: string
      origin:
        $ref: "#/definitions/LabourAgreementReference"
      effectivePeriod:
        $ref: "#/definitions/EffectivePeriod"
      line:
        items:
          $ref: "#/definitions/ArrangementLine"
        type: array
      payDate:
        $ref: "#/definitions/Occurrence"
      description:
        description: " A free‑text field for capturing additional details related to reward element (NL: beloningscomponent), such as specifics, limitations and other conditions."
        type: string
