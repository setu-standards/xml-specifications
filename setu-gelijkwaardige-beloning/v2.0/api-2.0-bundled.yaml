              description: 'If this allowance has a phasing out scheme arrangement, this can be described in this element. '
              type: string
            description:
              description: ' A free‑text field for capturing additional details related to reward element (NL: beloningscomponent), such as specifics, limitations and other conditions.'
              type: string
          type: object
        WorkDuration:
          description: Specifies the default work duration. This consists of an amount block indicating the number of hours, an interval block specifying the period over which these hours apply, and a valuePerWeek field indicating the equivalent number of hours per week, useful for calculations such as leave entitlement.
          required:
            - amount
            - interval
            - valuePerWeek
          additionalProperties: false
          properties:
            amount:
              $ref: '#/components/schemas/AmountLimited'
            interval:
              $ref: '#/components/schemas/Interval'
            valuePerWeek:
              description: The equivalent number of hours per week, useful for calculations such as leave entitlement.
              type: number
          type: object
        SalaryScaleStep:
          description: ' Specifies the steps within each salary scale, where each step has a name/label, a salary value, and possible conditions.'
          required:
            - name
            - value
          additionalProperties: false
          properties:
            name:
              description: The name or label of the salary step. E.g., 1,2,3.
              type: string
            value:
              description: The value of the salary scale step.
              type: number
            minimumWage:
