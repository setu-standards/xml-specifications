    error-object:
      type: object
      properties:
        code:
          type: string
        description:
          type: string
    IntervalCode:
      type: string
      enum:
        - Day
        - DayPart
        - Hour
        - Item
        - Kilometer
        - Month
        - Night
        - Once
        - OnExpenseBasis
        - Quarter
        - Relocation
        - Route
        - Shift
        - Trip
        - Week
        - WeeklyTravelDay
        - WorkedDay
        - WorkFromHomeDay
        - Year
    IdValue:
      type: string
    Id:
      description: A unique identifier of this specific leave line element.
      required:
        - value
      additionalProperties: false
      properties:
        value:
          $ref: '#/components/schemas/IdValue'
      type: object
    AmountUnitCode:
      type: string
      enum:
        - Hour
        - Percentage
        - Euro
        - SalaryStep
        - Day
    BaseUnitCode:
      type: string
      enum:
        - HourlyRate
        - DailyRate
        - FourWeeklyRate
        - MonthlyRate
        - YearlyRate
        - Expense
        - Fixed
    BaseDefinitionCode:
      type: string
      enum:
        - GrossSalary
        - UsualWage
        - BaseWage
        - SocialInsuranceWage
        - HolidayAllowance
        - Pension
        - SickPay
        - 13thMonth
    BaseAmount:
      description: This element stores information about the base over which the amount is calculated. If the value is 3, the unit code is 'Percentage' and the base code is 'MonthlyRate', and the basetype is `GrossSalary` together they would imply a 3% of monthly gross salary.
      required:
        - unitCode
      additionalProperties: false
      properties:
        unitCode:
          $ref: '#/components/schemas/BaseUnitCode'
        baseType:
          $ref: '#/components/schemas/BaseDefinitionCode'
        value:
          description: This element can be used to store additional information about the value of the base if applicable.
          type: number
        minValue:
          description: |-
            If applicable, a minimum value can be provided to signify a minimum that the value in this base has to be. This implies that if the value is less than the minimum value, the minimum value will be used instead of the value element. 

            If the amount of the monthly rate of the gross salary is 3000 (which is the monthly salary) and the min value of the base amount is 4000, the 4000 would be used as the value. 
          type: number
        maxValue:
          description: |-
            If applicable, a maximum value can be provided to signify a maximum that the value in this base has to be. This implies that if the value is max than the maximum value, the maximum value will be used instead of the value element. 

            If the amount of the monthly rate of the gross salary is 3000 (which is the monthly salary) and the max value is 2000, the 2000 would be used as the value. 
          type: number
      type: object
    Proportional:
      description: 'The proportional element is used to specify whether certain work-related conditions such as leave entitlements, remuneration, or similar employment provisions are applied proportionally based on specific employee characteristics. '
      required:
        - partTimePercentage
        - employmentDuration
      additionalProperties: false
      properties:
        partTimePercentage:
          description: Indicates whether the condition is calculated proportionally based on the employee’s part‑time percentage, typically measured against a full‑time work week (commonly 36-40 hours).
          type: boolean
        employmentDuration:
          description: Indicates whether proportional calculation must be applied according to the employee's length of employment.
          type: boolean
        description:
          description: A free-text field for capturing any additional details, clarifications, or contextual information relevant to how the proportional rule is applied.
          type: string
      type: object
    Amount:
      description: Container element that contains the value of the amount, the type of unit of the value and a base. These three elements together can be used to calculate the amount of any type of rate. If applicable, a minimum and a maximum value can also be provided to signify a minimum and maximum that this rate provides. This implies that if the amount as a combination of the value and the base and the unit code is less than the minimum value, the minimum value will replace the value element.
      required:
        - value
        - unitCode
        - baseAmount
      additionalProperties: false
      properties:
        value:
          description: The numerical value of the remuneration amount expressed as decimal. The unit type of this value can be specified in the unit code element.
          type: number
        minValue:
          description: If applicable, a minimum value can be provided to signify a minimum that this rate provides. This implies that if the amount as a combination of the value and the base and the unit code is less than the minimum value, the minimum value will be used instead of the value element.
          type: number
        maxValue:
          description: If applicable, a maximum value can be provided to signify a maximum that this rate provides. This implies that if the amount as a combination of the value and the base and the unit code is less than the maximum value, the maximum value will be used instead of the value element.
          type: number
        unitCode:
          $ref: '#/components/schemas/AmountUnitCode'
        baseAmount:
          $ref: '#/components/schemas/BaseAmount'
        proportional:
          $ref: '#/components/schemas/Proportional'
      type: object
    Interval:
      description: This element is used to signify the interval in which this rate is applied. If this rate is applied every hour then the unit code would be 'Hour' or if this rate is applied every kilometer, the interval code would be 'Kilometer'. The value can be used to express denominations of the provided interval code. If for instance it is required that the interval is every 15 minutes, the unit code can be 'Hour' and the value will be 0.25 as a quarter of 60 minutes is 15 minutes.
      required:
        - value
        - unitCode
      additionalProperties: false
      properties:
        value:
          description: The value can be used to express denominations of the provided interval code.
          type: number
        unitCode:
          $ref: '#/components/schemas/IntervalCode'
      type: object
    Operators:
      type: string
      enum:
        - eq
        - neq
        - gt
        - gte
        - lt
        - lte
        - in
      description: Comparison operator used in conditions
    AgeCondition:
      type: object
      description: Condition based on age of the employee. The unit is always in years. Decimals are allowed (e.g. 18.5 years).
      required:
        - conditionType
        - operator
        - age
      properties:
        conditionType:
          type: string
          const: Age
        operator:
          $ref: '#/components/schemas/Operators'
        age:
          type: number
          description: The age of the employee in years. The unit is always in years. Decimals are allowed (e.g. 18.5 years).
      examples:
        - conditionType: Age
          operator: gte
          age: 18
        - conditionType: Age
          operator: lt
          age: 30
    EmploymentDurationCondition:
      type: object
      description: Condition based on the duration of employment of the employee.
      required:
        - conditionType
        - operator
        - duration
        - referenceDateType
      properties:
        conditionType:
          type: string
          const: EmploymentDuration
        operator:
          $ref: '#/components/schemas/Operators'
        duration:
          type: string
          description: Duration of the employment expressed according to ISO 8601-1 duration format.
        referenceDateType:
          type: string
          description: Which start date type of the employment to consider for determining the duration.
          enum:
            - SeniorityDate
            - HireDate
            - ContractStartDate
            - AssignmentStartDate
      examples:
        - conditionType: EmploymentDuration
          operator: gte
          duration: P2Y
          referenceDateType: HireDate
        - conditionType: EmploymentDuration
          operator: lt
          duration: P6M
          referenceDateType: ContractStartDate
        - conditionType: EmploymentDuration
          operator: eq
          duration: P12Y6M
          referenceDateType: SeniorityDate
    Single:
      type: object
      description: Single occurrence, e.g. a fixed date.
      required:
        - occurrenceType
        - date
      properties:
        occurrenceType:
          type: string
          const: Single
        date:
          type: string
          description: Point in time according to ISO 8601-1 format.
          format: date-time
          example: '2026-12-15'
      examples:
        - occurrenceType: Single
          date: '2026-12-15'
        - occurrenceType: Single
          date: '2024-07-01'
        - occurrenceType: Single
          date: 2024-07
    Recurring:
      type: object
      description: Recurring occurrence, e.g. a weekly or monthly event.
      required:
        - occurrenceType
        - interval
      properties:
        occurrenceType:
          type: string
          const: Recurring
        recurringInterval:
          type: string
          description: Recurring time interval according to ISO 8601-1 format.
          example: R/1945-05-05/P5Y
      examples:
        - occurrenceType: Recurring
          recurringInterval: R/P1M
        - occurrenceType: Recurring
          recurringInterval: R/P1W
        - occurrenceType: Recurring
          recurringInterval: R/1945-05-05/P5Y
    Relative:
      type: object
      description: Single occurrence relative to an event.
      required:
        - occurrenceType
        - event
        - offset
      properties:
        occurrenceType:
          type: string
          const: Relative
        event:
          type: string
          description: Type of event the occurrence is relative to.
          enum:
            - HireDate
            - ContractStart
            - ContractEnd
            - SeniorityStart
            - BirthDate
            - EvaluationDate
            - SalaryPeriodStart
            - SalaryPeriodEnd
            - SickLeave
            - OtherEvent
        offset:
          type: string
          description: The offset of the occurrence relative to an event. Time interval expressed according to ISO 8601-1 duration format. Use minus sign for negative offsets. Use 'PT0S' or 'P0D' to indicate no offset.
          format: duration
          example: P12Y6M
        eventName:
          type: string
          description: Short description of the event if 'OtherEvent' is selected as event type.
          example: Date of passing
      examples:
        - occurrenceType: Relative
          event: HireDate
          offset: P6M
        - occurrenceType: Relative
          event: ContractEnd
          offset: '-P6M'
    Occurrence:
      type: object
      description: Base type for occurrences with different occurrence types.
      oneOf:
        - $ref: '#/components/schemas/Single'
        - $ref: '#/components/schemas/Recurring'
        - $ref: '#/components/schemas/Relative'
      discriminator:
        propertyName: occurrenceType
        mapping:
          Single: '#/components/schemas/Single'
          Recurring: '#/components/schemas/Recurring'
          Relative: '#/components/schemas/Relative'
    OccurrenceCondition:
      type: object
      description: A condition based on time or an event.
      required:
        - conditionType
        - occurrence
      properties:
        conditionType:
          type: string
          const: Occurrence
        occurrence:
          description: Specification of the occurrence.
          $ref: '#/components/schemas/Occurrence'
    PositionProfileCondition:
      type: object
      description: Condition based on salary scale and optionally step within that scale.
      required:
        - conditionType
        - operator
        - positionProfileIds
      properties:
        conditionType:
          type: string
          const: PositionProfile
        operator:
          allOf:
            - $ref: '#/components/schemas/Operators'
            - enum:
                - in
        positionProfileIds:
          type: array
          description: |-
            List of position profiles to compare against. The condition is met when the employee's position profile
            matches any of the position profiles in this list.
          items:
            type: string
            description: |-
              Reference to the identifier of the position profile.
              Must match value in element 'Inquiry Pay Equity/position profile/position id /value'.
      examples:
        - conditionType: PositionProfile
          operator: in
          positionProfileIds:
            - Manager
            - TeamLead
        - conditionType: PositionProfile
          operator: in
          positionProfileIds:
            - 3b336865-0155-435b-8706-f3bf4e6bd953
    SalaryScaleCondition:
      type: object
      description: Condition based on salary scale and optionally step within that scale.
      required:
        - conditionType
        - operator
        - salaryScale
      properties:
        conditionType:
          type: string
          const: SalaryScale
        operator:
          $ref: '#/components/schemas/Operators'
        salaryScale:
          type: string
          description: |-
            Reference to name of the salary scale (e.g. 'FWG-10' of 'Schaal 10').
            Must match value in element 'Inquiry Pay Equity/remuneration/salary scale/name'
        step:
          type: string
          description: |-
            Optional reference to the name of the step within the scale (e.g. 'Trede 5').
            Must match value in element 'Inquiry Pay Equity/remuneration/salary scale/salary step/name'
      examples:
        - conditionType: SalaryScale
          operator: gte
          salaryScale: FWG-10
          step: Trede 5
        - conditionType: SalaryScale
          operator: eq
          salaryScale: FWG-11
    TextCondition:
      type: object
      description: A textual condition. Only use this one when a condition cannot be specified by means of the other condition types.
      required:
        - conditionType
        - description
      properties:
        conditionType:
          type: string
          const: Text
        description:
          type: string
          description: Full specification of the condition in natural language.
      examples:
        - conditionType: Text
          description: Employee has completed a training program on workplace safety.
        - conditionType: Text
          description: Employee is eligible for a bonus if the company meets its annual revenue targets.
    Condition:
      type: object
      description: Abstract condition object. Can be used to include different concrete condition types based on 'conditionType' discriminator property.
      oneOf:
        - $ref: '#/components/schemas/AgeCondition'
        - $ref: '#/components/schemas/EmploymentDurationCondition'
        - $ref: '#/components/schemas/OccurrenceCondition'
        - $ref: '#/components/schemas/PositionProfileCondition'
        - $ref: '#/components/schemas/SalaryScaleCondition'
        - $ref: '#/components/schemas/TextCondition'
        - $ref: '#/components/schemas/AllOfCondition'
        - $ref: '#/components/schemas/AnyOfCondition'
        - $ref: '#/components/schemas/NotCondition'
      discriminator:
        propertyName: conditionType
        mapping:
          Age: '#/components/schemas/AgeCondition'
          EmploymentDuration: '#/components/schemas/EmploymentDurationCondition'
          Occurrence: '#/components/schemas/OccurrenceCondition'
          PositionProfile: '#/components/schemas/PositionProfileCondition'
          SalaryScale: '#/components/schemas/SalaryScaleCondition'
          Text: '#/components/schemas/TextCondition'
          AllOf: '#/components/schemas/AllOfCondition'
          AnyOf: '#/components/schemas/AnyOfCondition'
          Not: '#/components/schemas/NotCondition'
    AllOfCondition:
      type: object
      description: Combition of conditions that ALL must evaluate to true
      required:
        - conditionType
        - conditions
      properties:
        conditionType:
          type: string
          const: AllOf
        conditions:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/Condition'
      examples:
        - conditionType: AllOf
          conditions:
            - conditionType: Age
              operator: gte
              age: 18
            - conditionType: SalaryScale
              operator: gte
              salaryScale: FWG-10
              step: Trede 5
        - conditionType: AllOf
          conditions:
            - conditionType: EmploymentDuration
              operator: gte
              duration: P2Y
              referenceDateType: HireDate
            - conditionType: Occurrence
              occurrence:
                type: Relative
                event: EvaluationDate
                offset: PT0S
    AnyOfCondition:
      type: object
      description: Combition of conditions where at least one must evaluate to true
      required:
        - conditionType
        - conditions
      properties:
        conditionType:
          type: string
          const: AnyOf
        conditions:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/Condition'
      examples:
        - conditionType: AnyOf
          conditions:
            - conditionType: Age
              operator: lt
              age: 18
            - conditionType: SalaryScale
              operator: lt
              salaryScale: FWG-10
              step: Trede 5
        - conditionType: AnyOf
          conditions:
            - conditionType: EmploymentDuration
              operator: lt
              duration: P2Y
              referenceDateType: HireDate
            - conditionType: Occurrence
              occurrence:
                type: Relative
                event: EvaluationDate
                offset: PT0S
    NotCondition:
      type: object
      description: Negation of condition
      required:
        - conditionType
        - condition
      properties:
        conditionType:
          type: string
          const: Not
        condition:
          $ref: '#/components/schemas/Condition'
      examples:
        - conditionType: Not
          condition:
            conditionType: Age
            operator: gte
            age: 18
        - conditionType: Not
          condition:
            conditionType: SalaryScale
            operator: gte
            salaryScale: FWG-10
            step: Trede 5
    ContributionSourceType:
      type: string
      enum:
        - Employee
        - Employer
    IkbReference:
      description: 'Container element to refer how a renumeration element connects to ''het Individueel Keuze Budget'' (EN: Individual Choice Budget).'
      required:
        - relationType
        - id
      additionalProperties: false
      properties:
        relationType:
          description: 'Provides the relationship between the line element and the IKB. '
          type: string
          enum:
            - Included
            - OnTop
            - None
        id:
          description: The unique identifier that references a specific arrangement or a specific rule within an arrangement.
          required:
            - value
          additionalProperties: false
          properties:
            value:
              $ref: '#/components/schemas/IdValue'
          type: object
        description:
          description: A free text-field for additional information and/or context about the ikb reference.
          type: string
      type: object
    SchemeAgencyId:
      enum:
        - Customer
        - Supplier
      type: string
    AmountLeaveDay:
      description: 'The financial equivalent of one special leave day. It reflects the cost or compensation value of a single day off from work. '
      required:
        - value
        - unitCode
        - baseAmount
      additionalProperties: false
      properties:
        value:
          description: The numerical value of the financial equivalent of one leave day. It reflects the cost or compensation value of a single day off from work.
          type: number
        minValue:
          description: If applicable, a minimum value can be provided to signify a minimum that this rate provides. This implies that if the amount as a combination of the value and the base and the unit code is less than the minimum value, the minimum value will be used instead of the value element.
          type: number
        maxValue:
          description: If applicable, a maximum value can be provided to signify a maximum that this rate provides. This implies that if the amount as a combination of the value and the base and the unit code is less than the maximum value, the maximum value will be used instead of the value element.
          type: number
        unitCode:
          $ref: '#/components/schemas/AmountUnitCode'
        baseAmount:
          $ref: '#/components/schemas/BaseAmount'
      type: object
    DateDatatype:
      type: string
      format: date
    DatePeriod:
      description: Single period spanning from the start date up and including to the end date. If both start and end is provided, the date period element indicates a range of dates. If only the start date is provided, the date period element only indicates this singular date.
      required:
        - start
      additionalProperties: false
      properties:
        start:
          $ref: '#/components/schemas/DateDatatype'
        end:
          $ref: '#/components/schemas/DateDatatype'
      type: object
    TimeDatatype:
      type: string
      format: time
    TimePeriod:
      description: |-
        The time period during which the allowance is applicable. This period spans from the start time up and including to the end time. 

        In the event that multiple time periods are required, multiple period elements can be provided.
      required:
        - start
        - end
      additionalProperties: false
      properties:
        start:
          $ref: '#/components/schemas/TimeDatatype'
        end:
          $ref: '#/components/schemas/TimeDatatype'
      type: object
    WeekdayCode:
      description: The day in the week to which the allowance is applicable.
      additionalProperties: false
      properties:
        value:
          enum:
            - Monday
            - Tuesday
            - Wednesday
            - Thursday
            - Friday
            - Saturday
            - Sunday
            - Holiday
          type: string
      type: object
    PersonName-formattedNameDatatype:
      type: string
    PersonName:
      description: A component for capturing summary or fine-grain data comprising a person's name.
      required:
        - formattedName
      additionalProperties: false
      properties:
        formattedName:
          $ref: '#/components/schemas/PersonName-formattedNameDatatype'
      type: object
    PhoneTypeArray-formattedNumberDatatype:
      type: string
    PhoneTypeArray:
      description: Array of phone information details.
      required:
        - formattedNumber
      additionalProperties: false
      properties:
        formattedNumber:
          $ref: '#/components/schemas/PhoneTypeArray-formattedNumberDatatype'
      type: object
    EmailTypeArray-addressDatatype:
      type: string
    EmailTypeArray:
      description: Array of email information details.
      required:
        - address
      additionalProperties: false
      properties:
        address:
          $ref: '#/components/schemas/EmailTypeArray-addressDatatype'
        useCode:
          description: Code identifying the usage of the contact point e.g. business, private, etc.
          enum:
            - Business
            - Private
          type: string
      type: object
    Communication:
      description: The communication channels (phone, email) to contact and reach the contact person.
      additionalProperties: false
      properties:
        phone:
          items:
            $ref: '#/components/schemas/PhoneTypeArray'
          type: array
        email:
          items:
            $ref: '#/components/schemas/EmailTypeArray'
          type: array
      type: object
    PositionProfile-positionTitleDatatype:
      type: string
    Identifier:
      description: The unique identifier of this arrangement.
      required:
        - value
        - schemeAgencyId
      additionalProperties: false
      properties:
        value:
          $ref: '#/components/schemas/IdValue'
        schemeAgencyId:
          $ref: '#/components/schemas/SchemeAgencyId'
      type: object
    LabourAgreementReference:
      description: Specifies the origin of the applicable agreement.
      required:
        - type
      additionalProperties: false
      properties:
        type:
          description: The type of agreement.
          enum:
            - CollectiveLabourAgreement
            - CollectiveLabourAgreementExtended
            - CustomLabourAgreement
            - Unknown
          type: string
      type: object
    EffectivePeriod:
      description: Indicates the validity period of this regulation. The period is from the start date up to and including the end date.
      additionalProperties: false
      properties:
        validFrom:
          $ref: '#/components/schemas/DateDatatype'
        validTo:
          $ref: '#/components/schemas/DateDatatype'
      type: object
    ArrangementLineLeave:
      description: Leave granted for specific, non-routine circumstances as defined by the employer or applicable Collective Labour Agreement, such as bereavement, marriage, or relocation. The specific reasons and duration of special leave may vary.
      additionalProperties: false
      properties:
        name:
          description: The name of the special leave
          type: string
        lineId:
          $ref: '#/components/schemas/Id'
        amount:
          $ref: '#/components/schemas/Amount'
        interval:
          $ref: '#/components/schemas/Interval'
        conditions:
          items:
            $ref: '#/components/schemas/Condition'
          type: array
        contributionSource:
          $ref: '#/components/schemas/ContributionSourceType'
        leaveDayValue:
          $ref: '#/components/schemas/AmountLeaveDay'
        ikbReference:
          items:
            $ref: '#/components/schemas/IkbReference'
          type: array
        description:
          description: ' A free‑text field for capturing additional details related to reward element (NL: beloningscomponent), such as specifics, limitations and other conditions.'
          type: string
      type: object
    MandatoryLeave:
      description: A policy mandating that employees utilize a certain amount of their accrued leave within a specified period.
      additionalProperties: false
      properties:
        description:
          description: Description of the mandatory leave allocation.
          type: string
      type: object
    ArrangementLineLimited:
      description: A container that contains the details of the increase rate. It includes elements such as the amount that is provided (3% of yearly salary), the interval in which this is applied in the specified period (e.g. each year) and any conditions that might have to be met for this rate to be applicable.
      additionalProperties: false
      properties:
        lineId:
          $ref: '#/components/schemas/Id'
        amount:
          $ref: '#/components/schemas/Amount'
        interval:
          $ref: '#/components/schemas/Interval'
        conditions:
          items:
            $ref: '#/components/schemas/Condition'
          type: array
        contributionSource:
          $ref: '#/components/schemas/ContributionSourceType'
      type: object
    AmountLimited:
      description: The value of the work duration in hours, expressed as decimal.
      required:
        - value
        - unitCode
      additionalProperties: false
      properties:
        value:
          description: The value of the amount.
          type: number
        unitCode:
          description: The unit of measure.
          enum:
            - Hour
          type: string
      type: object
    WorkDuration:
      description: Specifies the default work duration. This consists of an amount block indicating the number of hours, an interval block specifying the period over which these hours apply, and a valuePerWeek field indicating the equivalent number of hours per week, useful for calculations such as leave entitlement.
      required:
        - amount
        - interval
        - valuePerWeek
      additionalProperties: false
      properties:
        amount:
          $ref: '#/components/schemas/AmountLimited'
        interval:
          $ref: '#/components/schemas/Interval'
        valuePerWeek:
          description: The equivalent number of hours per week, useful for calculations such as leave entitlement.
          type: number
      type: object
    HourlyWageConversion:
      description: Information about the conversion to regular hourly wages.
      additionalProperties: false
      properties:
        hourlyWageFactor:
          description: |-
            A number used to calculate the hourly wage from a periodic salary (e.g., monthly salary). The periodic salary is divided by this factor to determine the hourly wage. 

            Formula: hourly wage = periodic salary / hourlyWageFactor.
          type: number
        hourlyWagePercentage:
          description: |-
            A percentage that the periodic salary (such as a monthly salary) is multiplied by to calculate the hourly wage.

            Formula: hourly wage = (periodic salary * hourlyWagePercentage) / 100.
          type: number
      type: object
    SalaryScaleStep:
      description: ' Specifies the steps within each salary scale, where each step has a name/label, a salary value, and possible conditions.'
      required:
        - name
        - value
      additionalProperties: false
      properties:
        name:
          description: The name or label of the salary step. E.g., 1,2,3.
          type: string
        value:
          description: The value of the salary scale step.
          type: number
        minimumWage:
          description: 'A boolean that indicates whether this salary step is equal to the minimum wage. '
          type: boolean
        conditions:
          items:
            $ref: '#/components/schemas/Condition'
          type: array
      type: object
    CareerLevel:
      description: Indicates whether work experience is considered in the salary scale, with a true or false value and a possible description.
      additionalProperties: false
      properties:
        indicator:
          description: A boolean indicating the presence of taking into account classification of career levels.
          type: boolean
        description:
          description: Description of the career levels.
          type: string
      type: object
    PositionProfileReference:
      description: 'Specifies the position profile that this salary scale is applied to. This element refers to the ''positionId/value'' element in the corresponding position profile. '
      required:
        - positionId
      additionalProperties: false
      properties:
        positionId:
          description: 'A unique identifier referencing the specific role or job profile as defined in the organization’s salary structure (NL: Salarishuis). This ID enables consistent linkage between the employee’s position and the corresponding salary scale and classification rules.'
          required:
            - value
          additionalProperties: false
          properties:
            value:
              $ref: '#/components/schemas/IdValue'
          type: object
        startSalaryStep:
          description: A code or numeric value indicating the initial salary step assigned to the role or employee upon entry into the salary scale. It defines the starting point within the organization’s structured salary progression.
          type: string
        description:
          description: 'A free-text field for capturing additional details related to the remuneration starting position (NL: inschaling), such as exceptions, special conditions, or justifications influencing the initial salary step or profile assignment.'
          type: string
      type: object
    SalaryScale:
      description: 'Base salary of a job or of an employee including minimum and maximum salary and certain salary steps. '
      required:
        - name
        - currency
      additionalProperties: false
      properties:
        name:
          description: The name or label of the salary scale. E.g., 1,2,3.
          type: string
        minValue:
          description: The minimum value of the salary scale.
          type: number
        maxValue:
          description: The maximum value of the salary scale.
          type: number
        currency:
          description: The three-letter currency code defined by the ISO 4217 standard (e.g., “EUR”, “USD”).
          type: string
        salaryStep:
          items:
            $ref: '#/components/schemas/SalaryScaleStep'
          type: array
        careerLevel:
          $ref: '#/components/schemas/CareerLevel'
        positionProfileReference:
          items:
            $ref: '#/components/schemas/PositionProfileReference'
          type: array
      type: object
    IndividualSalaryIncrease:
      description: The individual salary review is a process where an employee's salary is evaluated and adjusted based on individual performance, and other relevant criteria. This container specifies the increase rate of these adjustments.
      additionalProperties: false
      properties:
        effectiveDate:
          $ref: '#/components/schemas/Occurrence'
        line:
          $ref: '#/components/schemas/ArrangementLineLimited'
      type: object
    GeneralSalaryIncrease:
      description: The general salary adjustment refers to the increase applied uniformly to the entire salary table. This adjustment ensures that all employees receive a consistent percentage or fixed increase in their salaries. Please mind the usage note when to use this container.
      additionalProperties: false
      properties:
        effectiveDate:
          $ref: '#/components/schemas/Occurrence'
        amount:
          description: Container element that contains the value of the amount and the type of unit of the value.
          required:
            - value
            - unitCode
          additionalProperties: false
          properties:
            value:
              description: The numerical value of the remuneration amount expressed as decimal. The unit type of this value can be specified in the unit code element.
              type: number
            unitCode:
              $ref: '#/components/schemas/AmountUnitCode'
          type: object
        description:
          description: Free text description of the general salary table increase.
          type: string
      type: object
    SupplementaryArrangementCode:
      type: string
      enum:
        - ERA
        - Generationpact
        - AccidentBenefit
        - PAWW
        - PAZW
        - RVU
        - WGA
    ArrangementLine:
      description: A container that contains the details of the rate in which this pension is provided to the employee. It includes elements such as the amount that is provided (3% of monthly salary), the interval in which this is applied in the specified period (e.g. 'Hour' for an hourly application) and any conditions that might have to be met for this rate to be applicable.
      additionalProperties: false
