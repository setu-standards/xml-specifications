              $ref: '#/components/schemas/PersonName-formattedNameDatatype'
          type: object
        PositionProfile:
          description: These are the position profiles for which the inquiry pay equity applies. From the salary table and other arrangements, you can also use these positions for the conditions of those arrangements.
          required:
            - positionId
            - positionTitle
            - origin
          additionalProperties: false
          properties:
            positionId:
              description: The primary identifier of the position profile, typically from the system of record.
              required:
                - value
              additionalProperties: false
              properties:
                value:
                  $ref: '#/components/schemas/IdValue'
              type: object
            positionTitle:
              $ref: '#/components/schemas/PositionProfile-positionTitleDatatype'
            origin:
              $ref: '#/components/schemas/LabourAgreementReference'
            referenceTitle:
              description: This reference title provides a reference to the function/role as defined within the Collective Labour Agreement (CAO).
              type: string
            workDescription:
              description: The free text description of the work that this position normally requires.
              type: string
          type: object
        GeneralSalaryIncrease:
          description: The general salary adjustment refers to the increase applied uniformly to the entire salary table. This adjustment ensures that all employees receive a consistent percentage or fixed increase in their salaries. Please mind the usage note when to use this container.
          additionalProperties: false
          properties:
            effectiveDate:
              $ref: '#/components/schemas/Occurrence'
            amount:
              description: Container element that contains the value of the amount and the type of unit of the value.
              required:
                - value
                - unitCode
              additionalProperties: false
              properties:
                value:
                  description: The numerical value of the remuneration amount expressed as decimal. The unit type of this value can be specified in the unit code element.
                  type: number
                unitCode:
                  $ref: '#/components/schemas/AmountUnitCode'
              type: object
            description:
              description: Free text description of the general salary table increase.
              type: string
          type: object
        Communication:
          description: The communication channels (phone, email) to contact and reach the contact person.
          additionalProperties: false
          properties:
